<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>kud.io</title>
    <script>
      // kud.github.io/<repo> → kud.io/projects/<repo>; bare host → kud.io
      var p = location.pathname.replace(/^\/+|\/+$/g, "");
      location.replace(p ? "https://kud.io/projects/" + p : "https://kud.io");
    </script>
    <meta http-equiv="refresh" content="0; url=https://kud.io" />
  </head>
  <body>
    Moved to <a href="https://kud.io">kud.io</a>.
  </body>
</html>
