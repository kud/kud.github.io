<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kud.io</title>
    <meta http-equiv="refresh" content="1; url=https://kud.io" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
        color: #e2e8f0;
        background: #08080f;
        background-image: radial-gradient(
          ellipse 70% 55% at 50% 0%,
          rgba(124, 58, 237, 0.28),
          transparent 70%
        );
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .wrap {
        animation: fade 0.5s ease both;
      }
      .mark {
        font-size: clamp(44px, 9vw, 64px);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 20px;
        background: linear-gradient(
          135deg,
          #f1f5f9 0%,
          #a78bfa 58%,
          #7c3aed 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .msg {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #8892a4;
        font-size: 15px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a78bfa;
        animation: pulse 1.2s ease-in-out infinite;
      }
      a {
        color: #a78bfa;
        text-decoration: none;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.8);
        }
      }
    </style>
    <script>
      // kud.github.io/<repo> → kud.io/projects/<repo>; bare host → kud.io
      var p = location.pathname.replace(/^\/+|\/+$/g, "");
      var target = p ? "https://kud.io/projects/" + p : "https://kud.io";
      setTimeout(function () {
        location.replace(target);
      }, 900);
    </script>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">kud.io</div>
      <div class="msg">
        <span class="dot"></span> Taking you to the new home…
      </div>
    </div>
  </body>
</html>
